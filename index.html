<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- PWA & Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EdgePhone.AI" />
    <!-- Theme color for browser chrome -->
    <meta name="theme-color" content="#1F2041" />
    <!-- Disable automatic phone number / email detection -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    <title>EdgePhone.AI</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
  </head>
  <body>
    <div id="root"></div>
    <!-- COI Service Worker — must load BEFORE the main module.
         Injects COOP/COEP headers on GitHub Pages (no custom-header support).
         Required for WebGPU + MediaPipe LLM WASM (SharedArrayBuffer). -->
    <script>
      if ('serviceWorker' in navigator) {
        // Register synchronously so isolation is active before any module fetch.
        navigator.serviceWorker.register('/coi-serviceworker.js', { scope: '/' })
          .then(reg => {
            // If a new SW was installed, reload once so isolation takes effect.
            if (reg.installing || reg.waiting) {
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
              });
            }
          })
          .catch(err => console.warn('[COI-SW] Registration failed:', err));
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
