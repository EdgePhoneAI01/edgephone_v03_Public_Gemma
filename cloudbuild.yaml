steps:
  # Step 1: Build the nginx image with pre-built dist/ (no npm needed)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/edgephone-v01:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/edgephone-v01:latest'
      - '.'
    id: 'build'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/edgephone-v01'
    id: 'push'
    waitFor: ['build']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'edgephone-v01'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/edgephone-v01:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'
    id: 'deploy'
    waitFor: ['push']

substitutions:
  _REGION: europe-west1
  _REPO: edgephone
  _TAG: latest

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/edgephone-v01:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/edgephone-v01:latest'

options:
  logging: CLOUD_LOGGING_ONLY
