name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as
# we want to allow production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node setup ─────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Build ──────────────────────────────────────────────────────────────
      # VITE_MODEL_URL  → GitHub Releases direct-download URL for the model binary.
      #                   Set this secret in: Settings → Secrets → Actions.
      #                   Format: https://github.com/<user>/<repo>/releases/download/<tag>/gemma-2b-it-gpu-int4.bin
      #
      # VITE_BASE_URL   → Sub-path for GitHub Pages.
      #                   If site is at https://<user>.github.io/<repo>/ use  /<repo>/
      #                   For a custom domain or user-root site, use  /
      #
      # VITE_GEMINI_API_KEY → Optional, for the online Gemini mode.
      - name: Build
        env:
          VITE_MODEL_URL: ${{ secrets.VITE_MODEL_URL }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npm run build

      # ── GitHub Pages upload ────────────────────────────────────────────────
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
