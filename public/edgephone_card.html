<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=560, initial-scale=1.0" />
  <title>EdgePhone.AI — Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 560px;
      height: 280px;
      overflow: hidden;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .card {
      position: relative;
      width: 560px;
      height: 280px;
      background: linear-gradient(135deg, #1a1a35 0%, #1F2041 50%, #171730 100%);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Ambient glows */
    .glow-purple {
      position: absolute;
      top: -60px; left: -40px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(106,0,244,0.35) 0%, transparent 70%);
      pointer-events: none;
    }
    .glow-cyan {
      position: absolute;
      bottom: -80px; right: -40px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(0,229,255,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* ── Phone mockup ── */
    .phone-wrap {
      position: relative;
      flex-shrink: 0;
      margin-left: 28px;
      width: 110px;
      height: 220px;
    }
    .phone-shell {
      width: 110px;
      height: 220px;
      background: linear-gradient(160deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 100%);
      border-radius: 22px;
      border: 1.5px solid rgba(255,255,255,0.18);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05) inset, 0 4px 0 rgba(255,255,255,0.07) inset;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .phone-notch {
      width: 40px; height: 10px;
      background: #0a0a14;
      border-radius: 0 0 8px 8px;
      margin: 0 auto;
      flex-shrink: 0;
    }
    .phone-screen {
      flex: 1;
      background: #0d0d1a;
      padding: 6px 6px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px;
    }
    .status-time { font-size: 7px; font-weight: 700; color: #fff; }
    .status-icons { display: flex; gap: 2px; align-items: center; }
    .status-dot { width: 3px; height: 3px; border-radius: 50%; background: #fff; }

    /* AI Orb */
    .orb-container {
      height: 68px;
      background: linear-gradient(135deg, rgba(106,0,244,0.25), rgba(0,229,255,0.08));
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,229,255,0.2);
    }
    .orb-ring-1 { width: 70px; height: 70px; border-style: dashed; border-color: rgba(106,0,244,0.2); }
    .orb-ring-2 { width: 50px; height: 50px; }
    .orb-core {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6A00F4, #00E5FF);
      box-shadow: 0 0 20px rgba(106,0,244,0.6), 0 0 40px rgba(0,229,255,0.3);
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
      font-size: 11px;
    }
    .orb-dot {
      position: absolute;
      width: 3px; height: 3px; border-radius: 50%;
      box-shadow: 0 0 4px currentColor;
    }

    /* Metric pills */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }
    .metric {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 4px 5px;
    }
    .metric-label { font-size: 5px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1px; }
    .metric-value { font-size: 9px; font-weight: 700; color: #fff; }

    /* Nav bar */
    .phone-nav {
      height: 22px;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.2); }
    .nav-dot.active { background: #00E5FF; box-shadow: 0 0 6px #00E5FF; }
    .nav-ai-btn {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6A00F4, #00E5FF);
      box-shadow: 0 0 8px rgba(106,0,244,0.5);
      margin-top: -6px;
    }
    .phone-home {
      height: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .home-bar { width: 30px; height: 2px; background: rgba(255,255,255,0.2); border-radius: 2px; }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 0 28px 0 26px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 2;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6A00F4, #00E5FF);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(106,0,244,0.5);
      font-size: 16px;
    }
    .app-name {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .app-name span { color: #00E5FF; }
    .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
      letter-spacing: 0.2px;
      margin-top: -6px;
    }

    .badges {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      width: fit-content;
    }
    .badge-purple { background: rgba(106,0,244,0.15); border: 1px solid rgba(106,0,244,0.3); color: #bf80ff; }
    .badge-cyan   { background: rgba(0,229,255,0.1);  border: 1px solid rgba(0,229,255,0.25); color: #00E5FF; }
    .badge-green  { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #34d399; }

    .tagline {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.2);
      margin-top: 2px;
    }
    .tagline span { color: #00E5FF; }

    /* right accent line */
    .accent-bar {
      position: absolute;
      right: 0; top: 20px; bottom: 20px;
      width: 2px;
      background: linear-gradient(to bottom, transparent, #6A00F4 30%, #00E5FF 70%, transparent);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow-purple"></div>
    <div class="glow-cyan"></div>
    <div class="grid-overlay"></div>

    <!-- Phone mockup -->
    <div class="phone-wrap">
      <div class="phone-shell">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <!-- Status bar -->
          <div class="status-bar">
            <span class="status-time">13:34</span>
            <div class="status-icons">
              <div class="status-dot"></div>
              <div class="status-dot"></div>
              <div class="status-dot"></div>
            </div>
          </div>

          <!-- AI Orb visualizer -->
          <div class="orb-container">
            <div class="orb-ring orb-ring-1"></div>
            <div class="orb-ring orb-ring-2"></div>
            <div class="orb-core">🧠</div>
            <div class="orb-dot" style="top:8px;left:18px;color:#6A00F4;background:#6A00F4;"></div>
            <div class="orb-dot" style="top:14px;right:12px;color:#00E5FF;background:#00E5FF;"></div>
            <div class="orb-dot" style="bottom:10px;left:22px;color:#00E5FF;background:#00E5FF;"></div>
          </div>

          <!-- Metrics -->
          <div class="metrics">
            <div class="metric">
              <div class="metric-label">NPU Load</div>
              <div class="metric-value" style="color:#00E5FF">27%</div>
            </div>
            <div class="metric">
              <div class="metric-label">Privacy</div>
              <div class="metric-value" style="color:#34d399">98/100</div>
            </div>
            <div class="metric">
              <div class="metric-label">Latency</div>
              <div class="metric-value">0.4ms</div>
            </div>
            <div class="metric">
              <div class="metric-label">Mode</div>
              <div class="metric-value" style="color:#6A00F4">LOCAL</div>
            </div>
          </div>
        </div>

        <!-- Nav -->
        <div class="phone-nav">
          <div class="nav-dot active"></div>
          <div class="nav-dot"></div>
          <div class="nav-ai-btn"></div>
          <div class="nav-dot"></div>
          <div class="nav-dot"></div>
        </div>
        <div class="phone-home"><div class="home-bar"></div></div>
      </div>
    </div>

    <!-- Text content -->
    <div class="content">
      <div>
        <div class="logo-row">
          <div class="logo-icon">⚡</div>
          <div class="app-name">EdgePhone<span>.AI</span></div>
        </div>
        <div class="subtitle">On-Device Neural Intelligence Platform</div>
      </div>

      <div class="badges">
        <div class="badge badge-purple">🔒 Privacy Vault · Zero Cloud Exposure</div>
        <div class="badge badge-cyan">⚡ NPU Accelerated · 12.4T ops/sec</div>
        <div class="badge badge-green">🤖 Edge AI Assistant · Always Private</div>
      </div>

      <div class="tagline">Local · <span>Secure</span> · Fast</div>

      <div class="accent-bar"></div>
    </div>
  </div>
</body>
</html>
